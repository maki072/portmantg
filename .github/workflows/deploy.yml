name: Build & Release

on:
  push:
    branches: [master]
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build linux/amd64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o portmantg-linux-amd64 ./cmd/portmantg/
          ls -lh portmantg-linux-amd64

      - name: Package web assets
        run: tar -czf web.tar.gz web/

      - name: Upload build artifact
        uses: actions