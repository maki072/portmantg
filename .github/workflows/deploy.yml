name: Build & Release

on:
  push:
    branches: [master]
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build linux/amd64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o portmantg-linux-amd64 ./cmd/portmantg/
          ls -lh portmantg-linux-amd64

      - name: Package web assets
        run: tar -czf web.tar.gz web/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: portmantg-linux-amd64
          path: portmantg-linux-amd64
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            portmantg-linux-amd64
            web.tar.gz
            install.sh
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
